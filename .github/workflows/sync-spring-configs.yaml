name: Sync Spring Configs Parallel
on:
  push:
    paths:
      - 'config/**'

jobs:
  list-files:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: config/**
          json: true # This is the secret sauce

      - name: Set matrix output
        id: set-matrix
        run: echo "files=${{ steps.changed-files.outputs.all_changed_files }}" >> $GITHUB_OUTPUT

  sync-configs:
    needs: list-files
    if: ${{ needs.list-files.outputs.matrix != '[]' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: ${{ fromJson(needs.list-files.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Run script for file
        run: |
          echo "Processing file: ${{ matrix.file }}"