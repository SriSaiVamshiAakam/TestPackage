/*
 * This file was generated by the Gradle "init" task.
 */

plugins {
    // Support convention plugins written in Groovy. Convention plugins are build scripts in "src/main" that automatically become available as plugins in the main build.
    id "groovy-gradle-plugin"
}

repositories {
    // Use the plugin portal to apply community plugins in convention plugins.
    gradlePluginPortal()
}

dependencies {
    implementation "org.checkerframework:checkerframework-gradle-plugin:0.6.61"

    implementation "com.google.protobuf:protobuf-gradle-plugin:0.9.6"
    implementation "org.springframework.boot:spring-boot-gradle-plugin:4.0.1"
    annotationProcessor "org.checkerframework:checker:3.52.1"
}
